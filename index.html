<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlashMine</title>
    <style>
      body {
        margin: 0;
        background: #0a0a0a;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        overflow: hidden;
      }

      .nav {
        padding: 1rem 2rem;
        color: #999;
        font-size: 14px;
        position: relative;
        z-index: 10;
      }

      .main {
        position: relative;
        height: calc(100vh - 40px);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        pointer-events: none;
      }

      .cards {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 2rem;
        padding: 2rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 1.5rem;
        width: 320px;
        height: 180px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .card h2 {
        font-size: 20px;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .card p {
        margin: 8px 0 12px;
        font-size: 14px;
        color: #ddd;
      }

      .card .button {
        background-color: #5865f2;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 8px;
        font-weight: 500;
        text-decoration: none;
        text-align: center;
        transition: box-shadow 0.3s ease, transform 0.2s ease;
      }

      .card .button:hover {
        box-shadow: 0 0 16px #5865f2;
        transform: translateY(-2px);
      }

      .widget-card {
        position: relative;
      }

      .widget-card iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 12px;
        position: absolute;
        top: 0;
        left: 0;
      }

      .widget-card::before {
        content: "";
        display: block;
        padding-top: 56.25%; /* 16:9 ratio */
      }
    </style>
  </head>
  <body>
    <div class="nav">Home</div>
    <div class="main">
      <img src="original-c-37-f-3-efd-5-ac-755-ec-1487-ba-8-f-841-acc-62-10.png" alt="background" class="background" />
      <div class="cards">
        <div class="card">
          <h2>⚔️ SlashMine</h2>
          <p>Vanilla-like minecraft server with Role Play elements.</p>
          <a href="https://discord.gg/YOUR_INVITE" class="button" target="_blank">Join our discord today</a>
        </div>
        <div class="card widget-card">
          <iframe
            src="https://xzor0ff.github.io/SlashMine/"
            allowtransparency="true"
            sandbox="allow-scripts allow-same-origin"
          ></iframe>
        </div>
      </div>
    </div>
  </body>
</html>






<div style="font-family: 'Segoe UI', sans-serif; width: 320px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; backdrop-filter: blur(6px); color: white;">
  <div style="margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 6px; font-size: 14px; color: #eee;">
    slashmine.aternos.me
  </div>
  <table style="width: 100%; font-size: 14px; border-collapse: collapse;">
    <tr>
      <td style="padding: 6px 0; color: #ccc;">Status</td>
      <td id="version" style="padding: 6px 0;">
        <span style="padding: 2px 8px; border-radius: 6px; background: gray;">Loading...</span>
      </td>
    </tr>
    <tr>
      <td style="padding: 6px 0; color: #ccc;">Host</td>
      <td style="padding: 6px 0;">slashmine.aternos.me</td>
    </tr>
    <tr>
      <td style="padding: 6px 0; color: #ccc;">Players</td>
      <td id="players" style="padding: 6px 0;">–</td>
    </tr>
  </table>
</div>

<script>
fetch("https://api.mcsrvstat.us/2/slashmine.aternos.me")
  .then(res => res.json())
  .then(data => {
    const versionEl = document.getElementById("version");
    const players = document.getElementById("players");

    const version = data.version || "Unknown";
    let color = "#3498db"; // default blue

    if (version.toLowerCase().includes("offline")) {
      color = "#e74c3c"; // red
    } else if (version.toLowerCase().includes("starting")) {
      color = "#f1c40f"; // yellow
    } else if (version.toLowerCase().includes("unknown")) {
      color = "gray";
    } else {
      color = "#2ecc71"; // green
    }

    versionEl.innerHTML = `<span style="background:${color}; color:white; padding: 2px 8px; border-radius:6px;">${version}</span>`;
    
    if (data.players && data.players.online !== undefined) {
      players.textContent = `${data.players.online} / ${data.players.max}`;
    } else {
      players.textContent = "–";
    }
  })
  .catch(() => {
    document.getElementById("version").innerHTML = `<span style="background:gray; padding: 2px 8px; border-radius:6px;">Error</span>`;
    document.getElementById("players").textContent = "–";
  });
</script>
